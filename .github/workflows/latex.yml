name: Build LaTeX PDF

on:
  push:
    branches:
      - main

jobs:
  build_pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v3
        with:
          name: latex-pdf
          path: main.pdf
